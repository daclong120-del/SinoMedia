<svg viewBox="0 0 1300 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="1300" height="900" fill="#f9fafb"/>
  <text x="650" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#111827">Kiến trúc Crawl Có Mục Đích + Lưu Trữ Media qua Cloudflare R2</text>

  <!-- Frontend -->
  <rect x="40" y="80" width="210" height="105" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="145" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Frontend / Dashboard</text>
  <text x="145" y="132" text-anchor="middle" font-size="12" fill="#1e40af">Nhập keyword/link</text>
  <text x="145" y="150" text-anchor="middle" font-size="12" fill="#1e40af">→ tạo crawler_tasks</text>
  <text x="145" y="168" text-anchor="middle" font-size="12" fill="#1e40af">(anon key, qua RLS)</text>

  <!-- Supabase DB -->
  <rect x="460" y="80" width="250" height="145" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="585" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#92400e">Supabase (DB)</text>
  <text x="585" y="129" text-anchor="middle" font-size="12" fill="#78350f">crawler_tasks (status, priority)</text>
  <text x="585" y="147" text-anchor="middle" font-size="12" fill="#78350f">crawled_posts / crawled_authors</text>
  <text x="585" y="165" text-anchor="middle" font-size="12" fill="#78350f">image_urls / video_urls (jsonb)</text>
  <text x="585" y="183" text-anchor="middle" font-size="12" fill="#78350f">crawler_logs, RLS + Realtime</text>
  <text x="585" y="201" text-anchor="middle" font-size="12" fill="#78350f">Chỉ lưu URL R2, không lưu binary</text>

  <!-- Queue/Dispatcher -->
  <rect x="920" y="80" width="220" height="105" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="1030" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#4c1d95">Queue / Dispatcher</text>
  <text x="1030" y="132" text-anchor="middle" font-size="12" fill="#5b21b6">(tuỳ chọn, khi job nhiều)</text>
  <text x="1030" y="150" text-anchor="middle" font-size="12" fill="#5b21b6">pg_cron / trigger / Redis</text>
  <text x="1030" y="168" text-anchor="middle" font-size="12" fill="#5b21b6">ưu tiên, chống trùng job</text>

  <!-- Arrows top row -->
  <line x1="250" y1="132" x2="460" y2="132" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="355" y="120" text-anchor="middle" font-size="11.5" fill="#2563eb">INSERT crawler_tasks</text>

  <line x1="710" y1="132" x2="920" y2="132" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="5,4" marker-end="url(#arrowBlue)"/>
  <text x="815" y="120" text-anchor="middle" font-size="11.5" fill="#7c3aed">(nếu cần) đẩy job</text>

  <!-- Down to worker -->
  <line x1="585" y1="225" x2="585" y2="310" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="600" y="270" font-size="11.5" fill="#16a34a">Realtime subscribe /</text>
  <text x="600" y="286" font-size="11.5" fill="#16a34a">poll task pending</text>

  <!-- Crawler / Backend Worker -->
  <rect x="410" y="310" width="350" height="180" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="585" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">Crawler / Queue Worker</text>
  <text x="585" y="362" text-anchor="middle" font-size="12" fill="#166534">Claim task (atomic UPDATE)</text>
  <text x="585" y="380" text-anchor="middle" font-size="12" fill="#166534">Crawl data text + lấy URL media gốc</text>
  <text x="585" y="398" text-anchor="middle" font-size="12" fill="#166534">Download ảnh/video về buffer tạm</text>
  <text x="585" y="416" text-anchor="middle" font-size="12" fill="#166534">Upload buffer → Cloudflare R2</text>
  <text x="585" y="434" text-anchor="middle" font-size="12" fill="#166534">Ghi text data + URL R2 vào DB</text>
  <text x="585" y="452" text-anchor="middle" font-size="12" fill="#166534">status = done / partial_failed</text>
  <text x="585" y="470" text-anchor="middle" font-size="12" fill="#166534">(service role, bypass RLS)</text>

  <!-- Target sources -->
  <rect x="920" y="310" width="260" height="180" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1050" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">Nguồn dữ liệu mục tiêu</text>
  <text x="1050" y="362" text-anchor="middle" font-size="12" fill="#991b1b">Zhihu / Douyin / App Store...</text>
  <text x="1050" y="380" text-anchor="middle" font-size="12" fill="#991b1b">Trả về: text + link ảnh/video gốc</text>
  <text x="1050" y="398" text-anchor="middle" font-size="12" fill="#991b1b">theo đúng keyword đã order</text>
  <text x="1050" y="416" text-anchor="middle" font-size="12" fill="#991b1b">Link gốc có thể bị hotlink-block</text>
  <text x="1050" y="434" text-anchor="middle" font-size="12" fill="#991b1b">hoặc hết hạn → cần re-host qua R2</text>

  <line x1="760" y1="380" x2="920" y2="380" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="920" y1="400" x2="760" y2="400" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="840" y="368" text-anchor="middle" font-size="11" fill="#7f1d1d">request crawl</text>
  <text x="840" y="418" text-anchor="middle" font-size="11" fill="#7f1d1d">data + media URL gốc</text>

  <!-- Cloudflare R2 -->
  <rect x="90" y="310" width="270" height="180" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="225" y="338" text-anchor="middle" font-size="15" font-weight="700" fill="#9a3412">Cloudflare R2 (Storage)</text>
  <text x="225" y="362" text-anchor="middle" font-size="12" fill="#7c2d12">Bucket: crawled-media</text>
  <text x="225" y="380" text-anchor="middle" font-size="12" fill="#7c2d12">Key: posts/{post_id}/{index}.jpg</text>
  <text x="225" y="398" text-anchor="middle" font-size="12" fill="#7c2d12">Upload qua S3-compatible API</text>
  <text x="225" y="416" text-anchor="middle" font-size="12" fill="#7c2d12">Public URL / custom domain (CDN)</text>
  <text x="225" y="434" text-anchor="middle" font-size="12" fill="#7c2d12">R2 Access Key/Secret trong</text>
  <text x="225" y="452" text-anchor="middle" font-size="12" fill="#7c2d12">.env.local của worker (KHÔNG ở FE)</text>

  <line x1="410" y1="400" x2="360" y2="400" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="385" y="388" text-anchor="middle" font-size="10.5" fill="#9a3412" transform="rotate(0)">PUT object</text>
  <line x1="360" y1="420" x2="410" y2="420" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="385" y="438" text-anchor="middle" font-size="10.5" fill="#9a3412">public URL</text>

  <!-- Worker -> DB write results -->
  <path d="M 585 310 C 585 260, 585 250, 585 225" fill="none" stroke="#16a34a" stroke-width="0" />
  <path d="M 700 310 C 780 260, 780 200, 710 195" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="790" y="255" text-anchor="middle" font-size="11.5" fill="#16a34a">Ghi text data +</text>
  <text x="790" y="271" text-anchor="middle" font-size="11.5" fill="#16a34a">R2 URL vào DB</text>

  <!-- DB -> FE realtime -->
  <path d="M 460 165 C 350 165, 250 195, 200 185" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="5,4" marker-end="url(#arrowBlue)"/>
  <text x="330" y="205" text-anchor="middle" font-size="11.5" fill="#2563eb">Realtime/poll status</text>
  <text x="330" y="221" text-anchor="middle" font-size="11.5" fill="#2563eb">→ hiển thị ảnh (R2 URL) cho FE</text>

  <!-- End user / browser viewing images -->
  <rect x="90" y="540" width="270" height="90" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="225" y="566" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Trình duyệt user</text>
  <text x="225" y="588" text-anchor="middle" font-size="11.5" fill="#4b5563">Load ảnh/video trực tiếp</text>
  <text x="225" y="604" text-anchor="middle" font-size="11.5" fill="#4b5563">từ R2 public URL (CDN)</text>
  <line x1="225" y1="490" x2="225" y2="540" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowOrange)" stroke-dasharray="4,3"/>
  <text x="240" y="518" font-size="11" fill="#9a3412">GET ảnh trực tiếp,</text>
  <text x="240" y="533" font-size="11" fill="#9a3412">không qua backend</text>

  <!-- Legend / notes -->
  <rect x="40" y="660" width="1220" height="220" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="60" y="690" font-size="15" font-weight="700" fill="#111827">Điểm mấu chốt khi thêm R2 vào pipeline:</text>
  <text x="60" y="716" font-size="12.5" fill="#374151">1. Worker là nơi DUY NHẤT upload lên R2 — dùng service role/API token của R2, KHÔNG đưa credential này ra frontend.</text>
  <text x="60" y="738" font-size="12.5" fill="#374151">2. DB chỉ lưu URL sau khi re-host (image_urls/video_urls jsonb), không lưu link gốc từ Zhihu/Douyin — vì link gốc dễ hết hạn hoặc bị chặn hotlink.</text>
  <text x="60" y="760" font-size="12.5" fill="#374151">3. Cần xử lý edge case: crawl text thành công nhưng upload media thất bại → set status = "partial_failed" để retry riêng phần media, tránh phải crawl lại từ đầu.</text>
  <text x="60" y="782" font-size="12.5" fill="#374151">4. Video thường nặng hơn ảnh nhiều — cân nhắc giới hạn kích thước tải/upload, timeout riêng, và có thể stream upload thay vì buffer toàn bộ vào RAM.</text>
  <text x="60" y="804" font-size="12.5" fill="#374151">5. Bật public access hoặc custom domain (CDN) cho bucket R2 để browser user load ảnh trực tiếp — không bắt backend làm proxy trả ảnh (tốn băng thông + chậm).</text>
  <text x="60" y="826" font-size="12.5" fill="#374151">6. Đặt tên key rõ ràng theo cấu trúc posts/{post_id}/{index}.ext để dễ trace, tránh trùng tên file khi nhiều task chạy song song.</text>
  <text x="60" y="848" font-size="12.5" fill="#374151">7. Nên có cơ chế dọn rác (cleanup job) cho ảnh mồ côi — nếu task bị xoá hoặc crawl lại, ảnh cũ trên R2 không tự mất, dễ phình dung lượng theo thời gian.</text>
</svg>
