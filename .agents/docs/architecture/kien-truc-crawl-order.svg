<svg viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="#f9fafb"/>
  <text x="600" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Kiến trúc Crawl Có Mục Đích (Targeted / On-demand Crawling)</text>

  <!-- Frontend -->
  <rect x="50" y="90" width="220" height="110" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">Frontend</text>
  <text x="160" y="145" text-anchor="middle" font-size="12.5" fill="#1e40af">User nhập keyword / app</text>
  <text x="160" y="163" text-anchor="middle" font-size="12.5" fill="#1e40af">→ tạo "crawl order"</text>
  <text x="160" y="181" text-anchor="middle" font-size="12.5" fill="#1e40af">(anon key, qua RLS)</text>

  <!-- Supabase DB -->
  <rect x="480" y="90" width="240" height="150" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="600" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">Supabase (DB)</text>
  <text x="600" y="143" text-anchor="middle" font-size="12.5" fill="#78350f">Bảng: crawl_jobs</text>
  <text x="600" y="161" text-anchor="middle" font-size="12.5" fill="#78350f">status: pending/running/done</text>
  <text x="600" y="179" text-anchor="middle" font-size="12.5" fill="#78350f">keyword, app_target, priority</text>
  <text x="600" y="197" text-anchor="middle" font-size="12.5" fill="#78350f">RLS: FE chỉ insert/đọc job của mình</text>
  <text x="600" y="215" text-anchor="middle" font-size="12.5" fill="#78350f">Realtime bật cho bảng job</text>

  <!-- Queue/Dispatcher -->
  <rect x="930" y="90" width="220" height="110" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="1040" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#4c1d95">Queue / Dispatcher</text>
  <text x="1040" y="145" text-anchor="middle" font-size="12.5" fill="#5b21b6">(tuỳ chọn nếu nhiều job)</text>
  <text x="1040" y="163" text-anchor="middle" font-size="12.5" fill="#5b21b6">Redis / pg_cron / trigger</text>
  <text x="1040" y="181" text-anchor="middle" font-size="12.5" fill="#5b21b6">ưu tiên, chống trùng job</text>

  <!-- Arrow FE -> DB -->
  <line x1="270" y1="145" x2="480" y2="145" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="375" y="132" text-anchor="middle" font-size="12" fill="#2563eb">INSERT crawl_jobs</text>

  <!-- Arrow DB -> Queue -->
  <line x1="720" y1="145" x2="930" y2="145" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowBlue)" stroke-dasharray="5,4"/>
  <text x="825" y="132" text-anchor="middle" font-size="12" fill="#7c3aed">(nếu cần) đẩy job</text>

  <!-- Realtime/poll DB -> Crawler downward -->
  <line x1="600" y1="240" x2="600" y2="330" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="615" y="290" font-size="12" fill="#16a34a">Realtime subscribe /</text>
  <text x="615" y="306" font-size="12" fill="#16a34a">poll job "pending"</text>

  <!-- Crawler / Backend Worker -->
  <rect x="440" y="330" width="320" height="160" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="600" y="360" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">Crawler / Backend Worker</text>
  <text x="600" y="386" text-anchor="middle" font-size="12.5" fill="#166534">Nhận job (keyword, app_target)</text>
  <text x="600" y="404" text-anchor="middle" font-size="12.5" fill="#166534">Chạy crawl có mục tiêu</text>
  <text x="600" y="422" text-anchor="middle" font-size="12.5" fill="#166534">UPDATE status = running</text>
  <text x="600" y="440" text-anchor="middle" font-size="12.5" fill="#166534">Ghi kết quả + status = done/failed</text>
  <text x="600" y="458" text-anchor="middle" font-size="12.5" fill="#166534">(dùng service role, bypass RLS)</text>
  <text x="600" y="476" text-anchor="middle" font-size="12.5" fill="#166534">Retry / rate-limit / log lỗi</text>

  <!-- Target sources -->
  <rect x="880" y="330" width="270" height="160" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1015" y="360" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">Nguồn dữ liệu mục tiêu</text>
  <text x="1015" y="386" text-anchor="middle" font-size="12.5" fill="#991b1b">App Store / Website / API</text>
  <text x="1015" y="404" text-anchor="middle" font-size="12.5" fill="#991b1b">theo đúng keyword đã order</text>
  <text x="1015" y="422" text-anchor="middle" font-size="12.5" fill="#991b1b">Không crawl tràn lan</text>
  <text x="1015" y="440" text-anchor="middle" font-size="12.5" fill="#991b1b">Tối ưu quota / chi phí request</text>

  <!-- Crawler <-> sources -->
  <line x1="760" y1="400" x2="880" y2="400" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="420" x2="760" y2="420" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="820" y="388" text-anchor="middle" font-size="11.5" fill="#7f1d1d">request</text>
  <text x="820" y="440" text-anchor="middle" font-size="11.5" fill="#7f1d1d">data thô</text>

  <!-- Crawler -> DB results -->
  <path d="M 440 380 C 300 380, 300 240, 480 200" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="300" y="300" text-anchor="middle" font-size="12" fill="#16a34a">Ghi kết quả</text>
  <text x="300" y="316" text-anchor="middle" font-size="12" fill="#16a34a">vào bảng data</text>

  <!-- DB -> FE result read -->
  <path d="M 480 175 C 350 175, 250 210, 200 200" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="5,4" marker-end="url(#arrowBlue)"/>
  <text x="330" y="238" text-anchor="middle" font-size="12" fill="#2563eb">Realtime/poll trạng thái</text>
  <text x="330" y="254" text-anchor="middle" font-size="12" fill="#2563eb">→ hiển thị kết quả cho FE</text>

  <!-- Legend / notes -->
  <rect x="50" y="560" width="1100" height="180" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="70" y="590" font-size="15" font-weight="700" fill="#111827">Điểm mấu chốt cho case của mày:</text>
  <text x="70" y="616" font-size="13" fill="#374151">1. Frontend KHÔNG gọi crawler trực tiếp — chỉ tạo "job" (record) trong bảng crawl_jobs. Đây là hàng đợi công việc (job queue pattern).</text>
  <text x="70" y="638" font-size="13" fill="#374151">2. Crawler poll hoặc subscribe Realtime để biết có job mới → tự lấy job theo priority/FIFO, tránh crawl 2 lần cùng 1 keyword.</text>
  <text x="70" y="660" font-size="13" fill="#374151">3. Vì crawl có giới hạn số lượng, nên thêm cột priority, dedupe (unique keyword+app đang pending), và rate-limit trong worker.</text>
  <text x="70" y="682" font-size="13" fill="#374151">4. Crawler dùng service role key ghi thẳng DB (bypass RLS) — vì nó là backend tin cậy, không phải client public.</text>
  <text x="70" y="704" font-size="13" fill="#374151">5. Frontend nhận kết quả qua Realtime subscription (hoặc polling status) — không cần thêm API riêng cho việc này.</text>
  <text x="70" y="726" font-size="13" fill="#374151">6. Nếu số lượng job tăng cao / cần retry phức tạp → thêm Queue (Redis/pg_cron) giữa DB và Crawler như hình vẽ (đường nét đứt).</text>
</svg>
