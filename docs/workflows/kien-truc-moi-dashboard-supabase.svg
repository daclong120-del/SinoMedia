<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="900" fill="#f8fafc"/>
  <text x="600" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Kiến trúc MỚI — Repository + Service Layer (Dashboard ↔ Supabase)</text>

  <!-- BROWSER -->
  <rect x="40" y="55" width="560" height="120" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="320" y="76" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1d4ed8">BROWSER</text>
  <rect x="60" y="90" width="240" height="70" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="118" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">Server Component</text>
  <text x="180" y="135" text-anchor="middle" font-size="10.5" fill="#475569">(page.tsx)</text>
  <rect x="330" y="90" width="240" height="70" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="118" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">Client Component</text>
  <text x="450" y="135" text-anchor="middle" font-size="10.5" fill="#475569">(interactive UI)</text>

  <!-- NEXT.JS SERVER (big container) -->
  <rect x="40" y="205" width="900" height="440" rx="14" fill="#f8fafc" stroke="#64748b" stroke-width="2" stroke-dasharray="0"/>
  <text x="490" y="228" text-anchor="middle" font-size="13.5" font-weight="700" fill="#334155">NEXT.JS SERVER</text>

  <!-- API Routes -->
  <rect x="620" y="245" width="280" height="90" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="760" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">API Routes</text>
  <text x="760" y="282" text-anchor="middle" font-size="10.5" fill="#7c2d12">(chỉ cho interactive actions)</text>
  <text x="760" y="300" text-anchor="middle" font-size="10" fill="#7c2d12">POST /api/tasks</text>
  <text x="760" y="315" text-anchor="middle" font-size="10" fill="#7c2d12">POST /api/proxy</text>

  <!-- Services group -->
  <rect x="65" y="245" width="530" height="120" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="330" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Services (business logic)</text>
  <g font-size="10.3" fill="#ffffff" font-weight="600">
    <rect x="80" y="275" width="95" height="34" rx="7" fill="#4caf50"/>
    <text x="127" y="296" text-anchor="middle">dashboard</text>
    <rect x="185" y="275" width="80" height="34" rx="7" fill="#4caf50"/>
    <text x="225" y="296" text-anchor="middle">data</text>
    <rect x="275" y="275" width="90" height="34" rx="7" fill="#4caf50"/>
    <text x="320" y="296" text-anchor="middle">creative</text>
    <rect x="375" y="275" width="90" height="34" rx="7" fill="#4caf50"/>
    <text x="420" y="296" text-anchor="middle">crawler</text>
    <rect x="475" y="275" width="90" height="34" rx="7" fill="#4caf50"/>
    <text x="520" y="296" text-anchor="middle">system</text>
  </g>
  <text x="330" y="325" text-anchor="middle" font-size="9.5" fill="#166534">*.service.ts — mỗi service gọi 1 hoặc nhiều repository bên dưới</text>
  <text x="330" y="340" text-anchor="middle" font-size="9.5" fill="#166534">(chi tiết mapping xem bảng Page → Service → Repository)</text>

  <!-- Repositories group -->
  <rect x="65" y="385" width="835" height="115" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="482" y="404" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Repositories (DB access — mỗi repo = 1 bảng)</text>
  <g font-size="10" fill="#ffffff" font-weight="600">
    <rect x="80" y="415" width="90" height="34" rx="7" fill="#3b82f6"/><text x="125" y="436" text-anchor="middle">post.repo</text>
    <rect x="178" y="415" width="95" height="34" rx="7" fill="#3b82f6"/><text x="225" y="436" text-anchor="middle">author.repo</text>
    <rect x="281" y="415" width="90" height="34" rx="7" fill="#3b82f6"/><text x="326" y="436" text-anchor="middle">task.repo</text>
    <rect x="379" y="415" width="100" height="34" rx="7" fill="#3b82f6"/><text x="429" y="436" text-anchor="middle">account.repo</text>
    <rect x="487" y="415" width="95" height="34" rx="7" fill="#3b82f6"/><text x="534" y="436" text-anchor="middle">proxy.repo</text>
    <rect x="590" y="415" width="90" height="34" rx="7" fill="#3b82f6"/><text x="635" y="436" text-anchor="middle">audit.repo</text>
    <rect x="688" y="415" width="102" height="34" rx="7" fill="#3b82f6"/><text x="739" y="436" text-anchor="middle">comment.repo</text>
    <rect x="798" y="415" width="85" height="34" rx="7" fill="#3b82f6"/><text x="840" y="436" text-anchor="middle">log.repo</text>
  </g>
  <text x="482" y="470" text-anchor="middle" font-size="9.5" fill="#1e40af">Mỗi repo chỉ query đúng 1 bảng, không chứa logic nghiệp vụ</text>
  <text x="482" y="486" text-anchor="middle" font-size="9.5" fill="#1e40af">Nhận db client qua constructor: new PostRepository(db)</text>

  <!-- supabase/server.ts -->
  <rect x="65" y="520" width="835" height="60" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="482" y="545" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">lib/supabase/server.ts — createServerClient()</text>
  <text x="482" y="563" text-anchor="middle" font-size="10.5" fill="#1e40af">Cookie-based SSR auth · chạy Server-only · KHÔNG lộ ra browser</text>

  <!-- warning note -->
  <rect x="65" y="595" width="835" height="38" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="482" y="618" text-anchor="middle" font-size="10.5" fill="#854d0e">⚠ Cần kiểm tra: RLS đã bật trên các bảng nhạy cảm (crawler_accounts, audit_logs)? Nếu chưa, code Service là tuyến phòng thủ DUY NHẤT</text>

  <!-- REALTIME BRANCH (browser-only) -->
  <rect x="980" y="205" width="180" height="440" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="1070" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">REALTIME</text>
  <text x="1070" y="243" text-anchor="middle" font-size="10" fill="#9a3412">(Browser-only)</text>

  <rect x="1000" y="270" width="140" height="70" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="1070" y="298" text-anchor="middle" font-size="10.5" font-weight="600" fill="#9a3412">realtime/</text>
  <text x="1070" y="313" text-anchor="middle" font-size="10.5" font-weight="600" fill="#9a3412">subscriptions.ts</text>

  <rect x="1000" y="400" width="140" height="80" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="1070" y="425" text-anchor="middle" font-size="10.5" font-weight="700" fill="#7c2d12">supabase/client.ts</text>
  <text x="1070" y="441" text-anchor="middle" font-size="9.5" fill="#7c2d12">createBrowserClient()</text>
  <text x="1070" y="456" text-anchor="middle" font-size="9.5" fill="#7c2d12">ANON_KEY lộ browser</text>
  <text x="1070" y="470" text-anchor="middle" font-size="9.5" fill="#7c2d12">(chấp nhận được — chỉ realtime)</text>

  <text x="1070" y="560" text-anchor="middle" font-size="9.5" fill="#9a3412">Đây là file DUY NHẤT</text>
  <text x="1070" y="574" text-anchor="middle" font-size="9.5" fill="#9a3412">được phép dùng browser client</text>

  <!-- SUPABASE BACKEND -->
  <rect x="40" y="670" width="1120" height="180" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="600" y="695" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">SUPABASE</text>

  <rect x="65" y="715" width="640" height="110" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="385" y="740" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">PostgreSQL Database (10 bảng)</text>
  <text x="385" y="760" text-anchor="middle" font-size="10.5" fill="#475569">crawled_posts · crawled_authors · crawled_comments</text>
  <text x="385" y="776" text-anchor="middle" font-size="10.5" fill="#475569">crawler_tasks · crawler_accounts · crawler_proxies</text>
  <text x="385" y="792" text-anchor="middle" font-size="10.5" fill="#475569">crawler_logs · audit_logs · exported_files</text>
  <text x="385" y="810" text-anchor="middle" font-size="9.5" fill="#dc2626" font-weight="600">RLS: cần audit lại theo từng bảng ⚠</text>

  <rect x="725" y="715" width="410" height="110" rx="10" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="930" y="740" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">Realtime WebSocket</text>
  <text x="930" y="760" text-anchor="middle" font-size="10.5" fill="#475569">wss://.../realtime/v1/websocket</text>
  <text x="930" y="776" text-anchor="middle" font-size="10.5" fill="#475569">Publish: postgres_changes trên crawler_tasks</text>
  <text x="930" y="795" text-anchor="middle" font-size="9.5" fill="#dc2626" font-weight="600">Cần confirm: publication có tôn trọng RLS?</text>

  <!-- ================= ARROWS ================= -->
  <!-- SC -> Services -->
  <path d="M180,160 L180,245" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="120" y="200" font-size="9.5" fill="#334155">gọi trực tiếp</text>
  <text x="120" y="212" font-size="9.5" fill="#334155">(server-side)</text>

  <!-- CC -> API Routes -->
  <path d="M480,160 C550,180 650,190 720,245" fill="none" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrowOrange)"/>
  <text x="620" y="185" font-size="9.5" fill="#9a3412">fetch POST</text>

  <!-- CC -> Realtime subscriptions -->
  <path d="M570,110 C800,110 950,180 1010,275" fill="none" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrowOrange)"/>
  <text x="820" y="105" font-size="9.5" fill="#9a3412">subscribe (WebSocket)</text>

  <!-- API Routes -> Services -->
  <path d="M620,300 L600,305" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="560" y="245" font-size="9.5" fill="#334155">gọi crawler/system.service</text>

  <!-- Services -> Repositories -->
  <path d="M330,365 L330,385" fill="none" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="345" y="380" font-size="9.5" fill="#334155">gọi theo nghiệp vụ</text>

  <!-- Repositories -> supabase/server.ts -->
  <path d="M482,500 L482,520" fill="none" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- supabase/server.ts -> DB -->
  <path d="M400,580 C380,620 385,660 385,715" fill="none" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="650" font-size="9.5" fill="#1e3a8a">HTTP + cookie JWT</text>

  <!-- subscriptions -> client.ts -->
  <path d="M1070,340 L1070,400" fill="none" stroke="#ea580c" stroke-width="1.8" marker-end="url(#arrowOrange)"/>

  <!-- client.ts -> Realtime WS -->
  <path d="M1070,480 C1000,560 950,620 930,715" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="960" y="600" font-size="9.5" fill="#9a3412">ANON_KEY</text>

  <!-- DB <-> Realtime dashed link -->
  <path d="M705,770 L725,770" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDash)"/>
  <text x="655" y="762" font-size="9" fill="#64748b">logical</text>
  <text x="655" y="774" font-size="9" fill="#64748b">replication</text>

  <!-- legend -->
  <rect x="65" y="855" width="16" height="16" fill="#4caf50"/>
  <text x="88" y="867" font-size="10.5" fill="#334155">Service layer</text>
  <rect x="220" y="855" width="16" height="16" fill="#3b82f6"/>
  <text x="243" y="867" font-size="10.5" fill="#334155">Repository layer</text>
  <rect x="390" y="855" width="16" height="16" fill="#1d4ed8"/>
  <text x="413" y="867" font-size="10.5" fill="#334155">Supabase server (JWT cookie)</text>
  <rect x="640" y="855" width="16" height="16" fill="#ea580c"/>
  <text x="663" y="867" font-size="10.5" fill="#334155">Browser client — chỉ dùng cho Realtime (ANON_KEY)</text>
</svg>
